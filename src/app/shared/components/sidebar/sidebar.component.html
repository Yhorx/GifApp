<aside id="sidebar">
  <div class="brand-mark">Gif-App</div>
  <p>Historial de busquedas</p>

  <div class="history-list">
    <div *ngFor="let gif of tagHistory" class="history-item">
      <button type="button" class="history-tag" (click)="selectedGif(gif)">
        {{ gif | uppercase }}
      </button>
      <button type="button" class="delete-tag" aria-label="Eliminar busqueda" (click)="deleteSearch(gif)">X</button>
    </div>
  </div>
</aside>
