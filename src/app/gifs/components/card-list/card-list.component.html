<div *ngIf="gifList.length > 0; else none" class="gif-grid">
  <app-gifs-card *ngFor="let gif of gifList" [gif]="gif"></app-gifs-card>
</div>

<ng-template #none>
  <div class="empty-state">
    <p class="empty-icon">GIF</p>
    <h2>No hay resultados todavia</h2>
    <p>Prueba buscando una palabra clave para llenar esta galeria.</p>
  </div>
</ng-template>
